name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Private term scan
        env:
          PRIVATE_TERM_PATTERNS: ${{ secrets.PRIVATE_TERM_PATTERNS }}
        run: python scripts/check_public_terms.py

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy dashboard_service scripts tests examples

      - name: Pytest
        run: pytest

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build image
        run: docker build .
