name: Feature request
description: Propose a focused improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What operational or developer workflow should improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: dropdown
    id: release-impact
    attributes:
      label: Release impact
      options:
        - major
        - minor
        - patch
        - none
    validations:
      required: true
