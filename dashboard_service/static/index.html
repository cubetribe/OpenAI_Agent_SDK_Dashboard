<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agent SDK Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260508-n8n-runtime-zoom" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Live workflow</p>
          <h1 id="brand-name">Agent SDK Dashboard</h1>
        </div>
        <form id="token-form" class="token-form">
          <input
            id="token-input"
            name="token"
            type="password"
            autocomplete="off"
            placeholder="Access token"
            aria-label="Access token"
            required
          />
          <button type="submit">Connect</button>
          <button type="button" id="clear-token">Reset</button>
        </form>
      </header>

      <section class="status-strip" aria-label="Dashboard status">
        <div>
          <span class="label">Connection</span>
          <strong id="connection-state">Offline</strong>
        </div>
        <div>
          <span class="label">Active node</span>
          <strong id="active-node">None</strong>
        </div>
        <div>
          <span class="label">Events</span>
          <strong id="event-count">0</strong>
        </div>
      </section>

      <section class="workspace">
        <div class="graph-panel">
          <div class="graph-toolbar" aria-label="Workflow zoom controls">
            <button type="button" id="zoom-out" aria-label="Zoom out" title="Zoom out">-</button>
            <output id="zoom-level" aria-label="Zoom level">100%</output>
            <button type="button" id="zoom-in" aria-label="Zoom in" title="Zoom in">+</button>
            <button type="button" id="zoom-reset" aria-label="Reset zoom" title="Reset zoom">1:1</button>
            <button type="button" id="zoom-fit" aria-label="Fit workflow" title="Fit workflow">Fit</button>
          </div>
          <svg id="workflow-graph" viewBox="0 0 920 390" role="img" aria-label="Workflow graph"></svg>
        </div>
        <aside class="event-panel" aria-label="Event feed">
          <div class="panel-header">
            <h2>Events</h2>
            <form id="archive-form" class="archive-form">
              <select id="archive-status" name="status" aria-label="Archive status">
                <option value="">All</option>
                <option value="error">Errors</option>
                <option value="active">Active</option>
                <option value="success">Success</option>
              </select>
              <input
                id="archive-query"
                name="q"
                type="search"
                placeholder="Search"
                aria-label="Archive search"
              />
              <button type="submit">Search</button>
            </form>
          </div>
          <ol id="event-feed" class="event-feed"></ol>
        </aside>
      </section>
    </main>
    <script type="module" src="/static/app.js?v=20260508-n8n-runtime-zoom"></script>
  </body>
</html>
